server:
  port: 8080

spring:
  application:
    name: utest-gen-server
  ai:
    openai:
      api-key: ${LLM_API_KEY:}
      base-url: ${LLM_API_URL:http://localhost:8080/v1}
      chat:
        options:
          model: ${LLM_MODEL:gpt-4}
          max-tokens: 4096
          temperature: 0.7

# OpenCode 配置
opencode:
  enabled: true
  port: 3000
  startup-timeout: 30
  binary-dir: opencode
  request-timeout: 120000
  generation:
    timeout: 120000
    max-tokens: 4096
    temperature: 0.7
  fix:
    max-rounds: 2
    compile-timeout: 30000
    test-timeout: 60000

# LLM 配置（供 OpenCode 本地使用）
llm:
  api-url: ${LLM_API_URL:https://open.bigmodel.cn/api/paas/v4}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:glm-4.7-flash}
  max-tokens: 4096
  temperature: 0.7

# 远程后端服务配置（改为仅用于结果同步）
backend:
  api-url: ${BACKEND_API_URL:http://localhost:8080}
  api-key: ${BACKEND_API_KEY:}
  timeout: 60000
  sync-enabled: true       # 是否启用结果同步

# 提示词模板配置
prompt:
  template:
    external-enabled: false        # 是否启用外部提示词模板
    template-path: classpath:templates/prompts/  # 模板文件路径
    class-level-template: class-level-prompt.txt
    fix-template: fix-prompt.txt
    hot-reload: true               # 是否启用热更新
    cache-millis: -1               # 缓存时间，-1表示每次都重新加载

# 日志配置
logging:
  level:
    root: INFO
    com.utest.gen: DEBUG
    org.springframework.web: INFO
