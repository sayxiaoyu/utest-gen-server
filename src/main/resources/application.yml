server:
  port: 8080

spring:
  application:
    name: utest-gen-server
  ai:
    # MCP Server 配置（Spring AI Streamable HTTP）
    mcp:
      server:
        enabled: ${DB_MCP_ENABLED:false}
        name: db-mcp-server
        version: 1.0.0
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp

# OpenCode 配置
opencode:
  enabled: true
  port: 3000
  startup-timeout: 30
  binary-dir: opencode
  request-timeout: 120000
  pure: false              # 是否启用纯净模式（--pure 参数，跳过更新检查）
  generation:
    timeout: 120000
    max-tokens: 4096
    temperature: 0.7
  fix:
    max-rounds: 2
    compile-timeout: 30000
    test-timeout: 60000

# LLM 配置（供 OpenCode 本地使用）
llm:
  api-url: ${LLM_API_URL:https://open.bigmodel.cn/api/paas/v4}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:glm-4.7-flash}
  max-tokens: 4096
  temperature: 0.7

# 远程后端服务配置（改为仅用于结果同步）
backend:
  api-url: ${BACKEND_API_URL:http://localhost:8080}
  api-key: ${BACKEND_API_KEY:}
  timeout: 60000
  sync-enabled: false       # 是否启用结果同步

# DB MCP Server 配置
# 启用后，OpenCode 可通过 MCP 协议自主调用数据库采样工具
# 注意：数据源由 Agent 在运行时读取被测项目配置后动态提供，无需在此配置
db-mcp:
  enabled: ${DB_MCP_ENABLED:false}
  query-limit:
    max-rows: 10           # 每表最大返回行数
    timeout-seconds: 30    # 查询超时
    max-columns: 50        # 最大列数
  security:
    allowed-operations:
      - SELECT
    forbidden-keywords:
      - DELETE
      - DROP
      - TRUNCATE
      - UPDATE
      - INSERT
      - CREATE
      - ALTER

# 提示词模板配置
prompt:
  template:
    external-enabled: false        # 是否启用外部提示词模板
    template-path: classpath:templates/prompts/  # 模板文件路径
    class-level-template: class-level-prompt.txt
    fix-template: fix-prompt.txt
    hot-reload: true               # 是否启用热更新
    cache-millis: -1               # 缓存时间，-1表示每次都重新加载

# 日志配置
logging:
  level:
    root: INFO
    com.utest.gen: DEBUG
    org.springframework.web: INFO
